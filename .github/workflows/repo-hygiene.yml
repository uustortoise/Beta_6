name: Repo Hygiene

on:
  pull_request:
    branches: [ main, master, "beta-*" ]
  workflow_dispatch:

jobs:
  hygiene:
    name: Block Runtime Artifacts and Secrets
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run repository hygiene guard
      run: |
        python scripts/check_repo_hygiene.py

version: 1

defaults:
  min_day: 4
  max_day: 10
  seeds: [11, 22, 33]
  occupancy_threshold: 0.35
  calib_fraction: 0.20
  min_calib_samples: 500
  min_calib_label_support: 30
  calibration_method: isotonic
  comparison_window: dec4_to_dec10
  required_split_pass_ratio: 1.0
  require_baseline_for_promotion: false
  require_leakage_artifact: false
  baseline_version: top2_frag_v3
  baseline_artifact_hash: null
  baseline_artifact_path: null

variants:
  anchor_top2_frag_v3:
    description: Current top-2 frag tuned anchor setup.

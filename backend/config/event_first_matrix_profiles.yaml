      - --enable-bedroom-livingroom-segment-mode
      - --segment-bedroom-min-duration-seconds=30
      - --segment-bedroom-gap-merge-seconds=90
      - --segment-bedroom-min-activity-prob=0.30
      - --segment-livingroom-min-duration-seconds=60
      - --segment-livingroom-gap-merge-seconds=30
      - --segment-livingroom-min-activity-prob=0.40
      - --enable-bedroom-livingroom-prediction-smoothing
      - --bedroom-livingroom-prediction-smoothing-min-run-windows=9
      - --bedroom-livingroom-prediction-smoothing-gap-fill-windows=6
      - --enable-room-temporal-occupancy-features
      - --bedroom-livingroom-texture-profile=mixed
      - --enable-bedroom-livingroom-stage-a-hgb
      - --enable-bedroom-livingroom-hard-negative-mining
      - --bedroom-livingroom-hard-negative-weight=2.0
      - --enable-bedroom-livingroom-failure-replay
      - --bedroom-livingroom-failure-replay-weight=1.5
      - --bedroom-livingroom-max-replay-rows-per-day=1800
      - --livingroom-occupied-sample-weight=2.5
      - --hard-gate-min-train-days=3


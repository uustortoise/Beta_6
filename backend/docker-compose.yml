services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: elderlycare_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elderlycare}
      POSTGRES_DB: ${POSTGRES_DB:-elderlycare}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
